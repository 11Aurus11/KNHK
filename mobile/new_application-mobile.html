<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мобильная версия - Новая заявка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
        .phone-frame { width: 390px; height: 844px; margin: 20px auto; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; display: flex; flex-direction: column; }
        .status-bar { background: #333; color: white; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 14px; }
        .app-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; }
        .app-header h1 { font-size: 20px; margin: 0; }
        .app-header p { font-size: 12px; opacity: 0.9; margin: 5px 0 0 0; }
        .app-content { flex: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-card h2 { font-size: 18px; margin-bottom: 15px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: #555; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 12px; font-size: 14px; border: 2px solid #e1e1e1; border-radius: 10px; }
        .form-control:focus { outline: none; border-color: #667eea; }
        .radio-option { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .radio-option input { width: 18px; height: 18px; }
        .radio-option label { margin-bottom: 0; cursor: pointer; font-weight: normal; }
        .btn { width: 100%; padding: 15px; font-size: 14px; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .bottom-nav { background: white; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #eee; }
        .nav-item { text-align: center; color: #999; font-size: 12px; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: #667eea; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <span>9:41</span>
            <span>
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </span>
        </div>
        
        <div class="app-header">
            <h1><i class="fas fa-plus-circle"></i> Корочки.есть</h1>
            <p>Создание новой заявки</p>
        </div>
        
        <div class="app-content">
            <div class="form-card">
                <h2>Новая заявка на обучение</h2>
                
                <form>
                    <div class="form-group">
                        <label for="course_name">Наименование курса</label>
                        <input type="text" class="form-control" id="course_name" placeholder="Введите название курса">
                    </div>
                    
                    <div class="form-group">
                        <label for="start_date">Желаемая дата начала</label>
                        <input type="date" class="form-control" id="start_date">
                    </div>
                    
                    <div class="form-group">
                        <label>Способ оплаты</label>
                        <div class="radio-option">
                            <input type="radio" id="payment_1" name="payment_method" value="1">
                            <label for="payment_1">Наличные</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="payment_2" name="payment_method" value="2">
                            <label for="payment_2">Перевод по номеру телефона</label>
                        </div>
                    </div>
                    
                    <button type="button" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Отправить заявку
                    </button>
                </form>
            </div>
        </div>
        
        <div class="bottom-nav">
            <a href="#" class="nav-item">
                <i class="fas fa-home"></i>
                Главная
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-list"></i>
                Мои заявки
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-plus-circle"></i>
                Новая заявка
            </a>
        </div>
    </div>
</body>
</html>
